<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemple de Tableau - Neologicon</title>
  <!-- Attention au chemin : ajustez selon où se trouve ce fichier -->
  <link rel="stylesheet" href="../../css/style.css"> 
</head>
<body>

  <!-- C'EST ICI QUE LE MENU VA APPARAÎTRE AUTOMATIQUEMENT -->
  <div id="header"></div>

  <main>
    <h1>Recensement des Animaginaux</h1>
    <p>Voici la liste des créatures répertoriées dans le glossaire.</p>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Nom de la créature</th>
            <th>Habitat principal</th>
            <th>Niveau de danger</th>
            <th>Année de découverte</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Le Grumph des Bois</td>
            <td>Forêts denses</td>
            <td>Faible</td>
            <td>1998</td>
          </tr>
          <tr>
            <td>L'Oiseau-Tempête</td>
            <td>Montagnes venteuses</td>
            <td>Élevé</td>
            <td>2005</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <div id="footer"></div>

  <!-- Le chemin vers main.js doit être correct pour que le menu se charge -->
  <script src="../../js/main.js"></script>
</body>
</html>
